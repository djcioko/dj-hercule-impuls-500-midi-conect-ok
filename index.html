<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Inpulse 500 DJ App</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: Arial; display: flex; flex-direction: column; align-items: center; }
        .decks { display: flex; gap: 20px; margin-top: 50px; }
        .deck { border: 2px solid #ff7700; padding: 20px; width: 300px; text-align: center; border-radius: 10px; }
        .drop-zone { border: 2px dashed #ff7700; padding: 40px; margin-top: 10px; cursor: pointer; background: #222; }
        audio { margin-top: 15px; width: 100%; }
    </style>
</head>
<body>
    <h1>DJ Controller Inpulse 500</h1>
    <div class="decks">
        <div class="deck">
            <h3>DECK A (Ch: 2)</h3>
            <div class="drop-zone" id="dropA">TRAGE PIESA AICI</div>
            <audio id="audioA" controls></audio>
        </div>
        <div class="deck">
            <h3>DECK B (Ch: 3)</h3>
            <div class="drop-zone" id="dropB">TRAGE PIESA AICI</div>
            <audio id="audioB" controls></audio>
        </div>
    </div>

    <script>
        // Funcție de încărcare rapidă (Streaming)
        function setupDeck(dropId, audioId) {
            const drop = document.getElementById(dropId);
            const audio = document.getElementById(audioId);
            drop.addEventListener('dragover', (e) => e.preventDefault());
            drop.addEventListener('drop', (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file) {
                    audio.src = URL.createObjectURL(file); // Streaming direct, nu încarcă tot în RAM
                    audio.play();
                }
            });
        }
        setupDeck('dropA', 'audioA');
        setupDeck('dropB', 'audioB');

        // Mapare MIDI (Bazată pe pozele tale)
        navigator.requestMIDIAccess().then(access => {
            access.inputs.forEach(input => {
                input.onmidimessage = (e) => {
                    const [status, note, velocity] = e.data;
                    const audioA = document.getElementById('audioA');
                    const audioB = document.getElementById('audioB');

                    // Deck A (Status 145 = Canal 2)
                    if (status === 145) {
                        if (note === 7) audioA.play();      // PLAY
                        if (note === 6) { audioA.pause(); audioA.currentTime = 0; } // CUE (Stop + Reset)
                    }
                    // Deck B (Status 146 = Canal 3)
                    if (status === 146) {
                        if (note === 7) audioB.play();      // PLAY
                        if (note === 6) { audioB.pause(); audioB.currentTime = 0; } // CUE
                    }
                };
            });
        });
    </script>
</body>
</html>
