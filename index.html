<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Inpulse 500 Web Controller</title>
    <style>
        /* Designul CSS este inclus aici pentru stabilitate */
        body { background: #121212; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        h1 { color: #ff7700; margin-top: 20px; }
        .decks { display: flex; gap: 40px; margin-top: 30px; }
        .deck { background: #1e1e1e; border: 2px solid #333; padding: 30px; width: 320px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .drop-zone { border: 2px dashed #ff7700; padding: 50px 20px; margin: 20px 0; cursor: pointer; background: #2a2a2a; color: #ff7700; font-weight: bold; }
        audio { width: 100%; filter: invert(1) hue-rotate(180deg); margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Inpulse 500 Controller</h1>
    <div class="decks">
        <div class="deck">
            <h3>DECK A</h3>
            <div class="drop-zone" id="dropA">TRAGE PIESA AICI</div>
            <audio id="audioA" controls></audio>
        </div>
        <div class="deck">
            <h3>DECK B</h3>
            <div class="drop-zone" id="dropB">TRAGE PIESA AICI</div>
            <audio id="audioB" controls></audio>
        </div>
    </div>

    <script>
        function setupDeck(dropId, audioId) {
            const drop = document.getElementById(dropId);
            const audio = document.getElementById(audioId);
            drop.addEventListener('dragover', (e) => e.preventDefault());
            drop.addEventListener('drop', (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file) {
                    audio.src = URL.createObjectURL(file);
                    audio.play();
                }
            });
        }
        setupDeck('dropA', 'audioA');
        setupDeck('dropB', 'audioB');
    </script>
</body>
</html>
